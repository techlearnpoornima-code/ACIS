services:

  hermes:
    image: nousresearch/hermes-agent:latest
    ports:
      - "8765:8765"
    volumes:
      - hermes_data:/root/.hermes
      - ./skills/acis:/root/.hermes/skills/acis   # mount ACIS skill into Hermes
      - ./output:/root/.hermes/sessions/acis       # Hermes session index over run outputs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: acis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acis}
      POSTGRES_DB: acis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # auto-apply migrations on first start
    restart: unless-stopped

volumes:
  hermes_data:
  pg_data:
