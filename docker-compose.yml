services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: acis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-acis}
      POSTGRES_DB: acis
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # auto-apply migrations on first start
    restart: unless-stopped

volumes:
  pg_data:
